<div class="section-shell skills-shell">
  <app-section-label label="// My Skills"></app-section-label>
  <br>
  <article class="code-panel skills-shell__panel">
    <div class="code-toolbar">
      <span class="toolbar-title">
        <span class="code-number">C#</span>
        <span>ITechStack.cs</span>
      </span>

      <span class="toolbar-dots">
        <span class="toolbar-dot toolbar-dot--yellow"></span>
        <span class="toolbar-dot toolbar-dot--green"></span>
      </span>
    </div>

    <div class="code-body">
      <div class="skills-shell__header">
        <span class="code-keyword">public interface</span>
        <strong> ITechStack</strong>
        <span>&#123;</span>
      </div>

      <div class="skills-shell__body">
        @for (category of categories; track category.label) {
          <div class="skills-shell__category">
            <p class="skills-shell__comment"> &nbsp;/*======= {{ category.label }} =======*/</p>

            <div class="skills-shell__grid">
              @for (skill of category.skills; track skill.name) {
                <div class="skills-shell__pill" [style.--pill-color]="skill.color">
                  &nbsp;
                  <span class="skills-shell__glyph">{{ skill.glyph }}</span>
                  <span class="skills-shell__name">{{ skill.name }}</span>
                </div>
              }
            </div>
          </div>
        }
      </div>

      <div class="skills-shell__footer">&#125;</div>
    </div>
  </article>
</div>
